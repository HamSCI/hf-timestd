<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Timing Analysis Dashboard - hf-timestd</title>
    <link rel="stylesheet" href="/styles.css">
    <script src="https://cdn.plot.ly/plotly-2.24.1.min.js"></script>
    <script>
        window.TIMESTD_CURRENT_PAGE = 'timing';
    </script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: #0a0e27;
            color: #e0e0e0;
            padding: 20px;
        }

        .header {
            background: linear-gradient(135deg, #1e3a8a 0%, #312e81 100%);
            padding: 20px 30px;
            border-radius: 10px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
        }

        .header h1 {
            color: #fff;
            font-size: 28px;
            margin-bottom: 10px;
        }

        .live-indicator {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(255, 255, 255, 0.1);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 14px;
        }

        .live-dot {
            width: 10px;
            height: 10px;
            background: #10b981;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.5;
            }
        }

        /* Info Link */
        .info-link {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: rgba(59, 130, 246, 0.2);
            color: #3b82f6;
            font-size: 11px;
            font-weight: 700;
            text-decoration: none;
            margin-left: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .info-link:hover {
            background: #3b82f6;
            color: #fff;
        }

        /* Alert Banner */
        .alert-banner {
            background: #dc2626;
            color: #fff;
            padding: 15px 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
            align-items: center;
            gap: 15px;
        }

        .alert-banner.visible {
            display: flex;
        }

        .alert-banner.warning {
            background: #f59e0b;
        }

        .alert-icon {
            font-size: 24px;
        }

        .alert-content {
            flex: 1;
        }

        .alert-title {
            font-weight: 600;
            font-size: 16px;
            margin-bottom: 4px;
        }

        .alert-message {
            font-size: 14px;
            opacity: 0.9;
        }

        /* GPSDO Anchor Status Panel */
        .gpsdo-panel {
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            border-radius: 10px;
            padding: 25px;
            margin-bottom: 20px;
            border: 2px solid #10b981;
            position: relative;
        }

        .gpsdo-panel.holdover {
            border-color: #f59e0b;
            background: linear-gradient(135deg, #1e293b 0%, #1c1917 100%);
        }

        .gpsdo-panel.startup,
        .gpsdo-panel.reanchor {
            border-color: #ef4444;
            background: linear-gradient(135deg, #1e293b 0%, #1c1917 100%);
        }

        .gpsdo-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .gpsdo-title {
            font-size: 18px;
            font-weight: 600;
            color: #fff;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .gpsdo-state-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            border-radius: 20px;
            font-weight: 600;
            font-size: 13px;
            text-transform: uppercase;
        }

        .gpsdo-state-badge.green {
            background: #10b981;
            color: #fff;
        }

        .gpsdo-state-badge.amber {
            background: #f59e0b;
            color: #fff;
            animation: pulse-amber 2s infinite;
        }

        .gpsdo-state-badge.red {
            background: #ef4444;
            color: #fff;
            animation: pulse-red 1.5s infinite;
        }

        @keyframes pulse-amber {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.7;
            }
        }

        @keyframes pulse-red {

            0%,
            100% {
                opacity: 1;
                box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.4);
            }

            50% {
                opacity: 0.8;
                box-shadow: 0 0 0 8px rgba(239, 68, 68, 0);
            }
        }

        .gpsdo-state-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: currentColor;
        }

        .gpsdo-metrics {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 15px;
            margin-bottom: 15px;
        }

        .gpsdo-metric {
            background: rgba(255, 255, 255, 0.03);
            padding: 15px;
            border-radius: 8px;
            text-align: center;
        }

        .gpsdo-metric-value {
            font-size: 28px;
            font-weight: 700;
            color: #fff;
            margin-bottom: 4px;
            font-family: 'Courier New', monospace;
        }

        .gpsdo-metric-value.good {
            color: #10b981;
        }

        .gpsdo-metric-value.warning {
            color: #f59e0b;
        }

        .gpsdo-metric-value.error {
            color: #ef4444;
        }

        .gpsdo-metric-label {
            font-size: 11px;
            color: #94a3b8;
            text-transform: uppercase;
            font-weight: 600;
        }

        .gpsdo-metric-sub {
            font-size: 12px;
            color: #64748b;
            margin-top: 4px;
        }

        .gpsdo-description {
            font-size: 13px;
            color: #94a3b8;
            padding: 10px 15px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 6px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .gpsdo-description-icon {
            font-size: 16px;
        }

        .verification-sparkline {
            display: flex;
            align-items: flex-end;
            gap: 2px;
            height: 30px;
            padding: 10px 15px;
            background: rgba(0, 0, 0, 0.15);
            border-radius: 6px;
            margin-top: 10px;
        }

        .sparkline-bar {
            width: 8px;
            background: #10b981;
            border-radius: 2px;
            min-height: 2px;
            transition: height 0.3s ease;
        }

        .sparkline-bar.warning {
            background: #f59e0b;
        }

        .sparkline-bar.error {
            background: #ef4444;
        }

        .sparkline-label {
            font-size: 10px;
            color: #64748b;
            margin-left: 10px;
            align-self: center;
        }

        /* Primary Reference Hero Section */
        .primary-reference {
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            border-radius: 10px;
            padding: 30px;
            margin-bottom: 20px;
            border-left: 5px solid #10b981;
        }

        .primary-reference.ntp {
            border-left-color: #3b82f6;
        }

        .primary-reference.degraded {
            border-left-color: #f59e0b;
        }

        .primary-reference.poor {
            border-left-color: #ef4444;
        }

        .ref-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .ref-title {
            font-size: 20px;
            font-weight: 600;
            color: #fff;
        }

        .quality-badge {
            display: inline-block;
            padding: 6px 16px;
            border-radius: 20px;
            font-weight: 600;
            font-size: 14px;
            text-transform: uppercase;
        }

        .quality-badge.tone-locked {
            background: #10b981;
            color: #fff;
        }

        .quality-badge.ntp-synced {
            background: #3b82f6;
            color: #fff;
        }

        .quality-badge.interpolated,
        .quality-badge.tone-aged {
            background: #f59e0b;
            color: #fff;
        }

        .quality-badge.tone-stable {
            background: #22c55e;
            /* Green - tone-based with excellent drift */
            color: #fff;
        }

        .quality-badge.wall-clock {
            background: #ef4444;
            color: #fff;
        }

        .ref-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .ref-metric {
            background: rgba(255, 255, 255, 0.03);
            padding: 15px;
            border-radius: 8px;
        }

        .ref-metric-label {
            font-size: 12px;
            color: #94a3b8;
            text-transform: uppercase;
            margin-bottom: 8px;
            font-weight: 600;
        }

        .ref-metric-value {
            font-size: 24px;
            font-weight: 700;
            color: #fff;
            margin-bottom: 4px;
        }

        .ref-metric-sub {
            font-size: 13px;
            color: #cbd5e1;
        }

        .ref-details {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            padding: 15px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 6px;
        }

        .ref-detail-item {
            display: flex;
            gap: 10px;
            font-size: 13px;
        }

        .ref-detail-label {
            color: #94a3b8;
            min-width: 100px;
        }

        .ref-detail-value {
            color: #e0e0e0;
            font-family: 'Courier New', monospace;
        }

        /* Health Cards Grid */
        .health-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .health-card {
            background: #1e293b;
            border-radius: 10px;
            padding: 25px;
            border-left: 4px solid #3b82f6;
        }

        .health-card-title {
            font-size: 14px;
            color: #94a3b8;
            text-transform: uppercase;
            margin-bottom: 15px;
            font-weight: 600;
        }

        .health-card-value {
            font-size: 36px;
            font-weight: 700;
            color: #fff;
            margin-bottom: 8px;
        }

        .health-card-percent {
            font-size: 18px;
            color: #cbd5e1;
            margin-bottom: 15px;
        }

        .health-card-quality {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            margin-bottom: 12px;
        }

        .health-card-quality.excellent {
            background: #10b981;
            color: #fff;
        }

        .health-card-quality.good {
            background: #3b82f6;
            color: #fff;
        }

        .health-card-quality.fair {
            background: #f59e0b;
            color: #fff;
        }

        .health-card-quality.poor {
            background: #ef4444;
            color: #fff;
        }

        .health-card-quality.collecting {
            background: rgba(148, 163, 184, 0.3);
            color: #94a3b8;
            font-style: italic;
        }

        .health-card-details {
            font-size: 13px;
            color: #cbd5e1;
            line-height: 1.6;
        }

        .health-card-details div {
            margin-bottom: 4px;
        }

        .channel-list {
            margin-top: 10px;
        }

        .channel-item {
            padding: 6px 10px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 4px;
            margin-bottom: 6px;
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
        }

        .status-dot.tone {
            background: #10b981;
        }

        .status-dot.ntp {
            background: #3b82f6;
        }

        .status-dot.wall {
            background: #ef4444;
        }

        /* Charts */
        .chart-section {
            background: #1e293b;
            border-radius: 10px;
            padding: 25px;
            margin-bottom: 20px;
        }

        .chart-header {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 20px;
            color: #fff;
        }

        .chart-container {
            width: 100%;
            height: 400px;
            background: #0f172a;
            border-radius: 8px;
        }

        /* Per-Channel Table */
        .channel-table-container {
            background: #1e293b;
            border-radius: 10px;
            padding: 25px;
            margin-bottom: 20px;
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        thead {
            background: #0f172a;
        }

        th {
            padding: 12px;
            text-align: left;
            font-size: 11px;
            color: #94a3b8;
            text-transform: uppercase;
            font-weight: 600;
        }

        td {
            padding: 12px;
            border-top: 1px solid #334155;
            font-size: 14px;
        }

        tr:hover {
            background: rgba(255, 255, 255, 0.02);
        }

        .health-score {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 12px;
            font-weight: 600;
            font-size: 13px;
        }

        .health-score.excellent {
            background: #10b981;
            color: #fff;
        }

        .health-score.good {
            background: #3b82f6;
            color: #fff;
        }

        .health-score.fair {
            background: #f59e0b;
            color: #fff;
        }

        .health-score.poor {
            background: #ef4444;
            color: #fff;
        }

        /* Transitions Log */
        .transitions-section {
            background: #1e293b;
            border-radius: 10px;
            padding: 25px;
            margin-bottom: 20px;
        }

        .transition-item {
            background: rgba(255, 255, 255, 0.03);
            border-left: 3px solid #3b82f6;
            padding: 15px;
            margin-bottom: 12px;
            border-radius: 6px;
        }

        .transition-time {
            font-size: 12px;
            color: #94a3b8;
            margin-bottom: 6px;
        }

        .transition-title {
            font-size: 15px;
            font-weight: 600;
            color: #fff;
            margin-bottom: 8px;
        }

        .transition-details {
            font-size: 13px;
            color: #cbd5e1;
            line-height: 1.6;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #94a3b8;
            font-size: 16px;
        }

        .error {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid #ef4444;
            color: #fca5a5;
            padding: 20px;
            border-radius: 8px;
            margin: 20px 0;
        }

        .refresh-countdown {
            display: inline-block;
            background: rgba(59, 130, 246, 0.2);
            color: #3b82f6;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 13px;
            font-weight: 600;
        }

        /* Propagation Mode Section */
        .propagation-section {
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            border-radius: 10px;
            padding: 25px;
            margin-bottom: 20px;
            border: 1px solid #334155;
        }

        .section-header {
            margin-bottom: 20px;
        }

        .section-title {
            font-size: 18px;
            font-weight: 600;
            color: #fff;
            display: block;
        }

        .section-subtitle {
            font-size: 13px;
            color: #94a3b8;
        }

        .prop-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 20px;
        }

        .prop-station {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 8px;
            padding: 15px;
        }

        .prop-station-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            padding-bottom: 10px;
            border-bottom: 1px solid #334155;
        }

        .prop-station-name {
            font-size: 16px;
            font-weight: 600;
            color: #fff;
        }

        .prop-station-distance {
            font-size: 12px;
            color: #94a3b8;
        }

        .prop-table {
            width: 100%;
            font-size: 13px;
        }

        .prop-table th {
            padding: 8px;
            text-align: left;
            font-size: 10px;
            text-transform: uppercase;
            color: #64748b;
            font-weight: 600;
        }

        .prop-table td {
            padding: 8px;
            border-top: 1px solid #1e293b;
        }

        .mode-badge {
            display: inline-block;
            background: #3b82f6;
            color: #fff;
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 11px;
            font-weight: 600;
        }

        .mode-badge.primary {
            background: #10b981;
        }

        .alt-mode {
            opacity: 0.7;
            font-size: 0.9em;
        }

        .alt-mode td {
            padding-top: 2px !important;
            padding-bottom: 2px !important;
        }

        .freq-cell {
            vertical-align: middle;
            font-weight: 600;
        }

        .primary-mode {
            border-top: 1px solid #334155;
        }
    </style>
</head>

<body>
    <div class="container">
        <!-- Unified Navigation -->
        <div id="timestd-navigation"></div>

        <div class="header">
            <h1>⏱️ Timing Analysis Dashboard</h1>
            <div style="display: flex; align-items: center; gap: 20px;">
                <div class="live-indicator">
                    <span class="live-dot"></span>
                    <span>Live Monitoring</span>
                    <span class="refresh-countdown" id="countdown-timer">Next update in 30s</span>
                </div>
            </div>
        </div>

        <!-- Alert Banner -->
        <div class="alert-banner" id="alert-banner">
            <span class="alert-icon">⚠️</span>
            <div class="alert-content">
                <div class="alert-title" id="alert-title">Critical Timing Issue</div>
                <div class="alert-message" id="alert-message">Loading...</div>
            </div>
        </div>

        <div id="dashboard-content">
            <div class="loading">⏳ Loading timing analysis data...</div>
        </div>

        <script>
            // Broadcast definitions (17 broadcasts across 4 stations)
            const BROADCASTS = [
                { name: 'WWV', freq: 2.5 }, { name: 'WWVH', freq: 2.5 }, { name: 'BPM', freq: 2.5 },
                { name: 'CHU', freq: 3.33 },
                { name: 'WWV', freq: 5 }, { name: 'WWVH', freq: 5 }, { name: 'BPM', freq: 5 },
                { name: 'CHU', freq: 7.85 },
                { name: 'WWV', freq: 10 }, { name: 'WWVH', freq: 10 }, { name: 'BPM', freq: 10 },
                { name: 'CHU', freq: 14.67 },
                { name: 'WWV', freq: 15 }, { name: 'WWVH', freq: 15 }, { name: 'BPM', freq: 15 },
                { name: 'WWV', freq: 20 },
                { name: 'WWV', freq: 25 }
            ];

            let refreshCountdown = 30;
            let countdownInterval = null;
            let autoRefreshInterval = null;

            function startCountdown() {
                refreshCountdown = 30;
                if (countdownInterval) clearInterval(countdownInterval);

                countdownInterval = setInterval(() => {
                    refreshCountdown--;
                    const timer = document.getElementById('countdown-timer');
                    if (timer) {
                        timer.textContent = `Next update in ${refreshCountdown}s`;
                    }
                    if (refreshCountdown <= 0) {
                        clearInterval(countdownInterval);
                    }
                }, 1000);
            }

            function startAutoRefresh() {
                if (autoRefreshInterval) clearInterval(autoRefreshInterval);

                autoRefreshInterval = setInterval(async () => {
                    // Update data without destroying DOM
                    await updateDashboardData();
                }, 30000); // Refresh every 30 seconds
            }

            async function updateDashboardData() {
                try {
                    // Fetch latest data without re-rendering entire dashboard
                    const [phase2Status, fusionData, chronyData] = await Promise.all([
                        fetch('/api/v1/timing/phase2-status').then(r => r.json()).catch(() => ({ available: false })),
                        fetch('/api/v1/timing/fusion').then(r => r.json()).catch(() => ({ status: 'no_data' })),
                        fetch('/api/v1/system/chrony').then(r => r.json()).catch(() => ({ available: false }))
                    ]);

                    // Update global data
                    window.phase2ChannelStatus = phase2Status;
                    window.fusionData = fusionData;
                    window.chronyData = chronyData;

                    // Refresh charts with new data (without destroying DOM)
                    loadCharts();
                    startCountdown();
                } catch (error) {
                    console.error('Error updating dashboard data:', error);
                }
            }

            async function loadDashboard() {
                try {
                    // Load data for fusion panel, broadcast table, and chrony comparison
                    const [phase2Status, fusionData, chronyData] = await Promise.all([
                        fetch('/api/v1/timing/phase2-status').then(r => r.json()).catch(() => ({ available: false })),
                        fetch('/api/v1/timing/fusion').then(r => r.json()).catch(() => ({ status: 'no_data' })),
                        fetch('/api/v1/system/chrony').then(r => r.json()).catch(() => ({ available: false }))
                    ]);

                    renderDashboard(phase2Status, fusionData, chronyData);
                    startCountdown();

                } catch (error) {
                    console.error('Error loading dashboard:', error);
                    document.getElementById('dashboard-content').innerHTML = `
                    <div class="error">
                        ❌ Failed to load timing data: ${error.message}
                        <br><br>
                        Please ensure analytics service is running and generating timing metrics.
                    </div>
                `;
                }
            }

            function renderDashboard(phase2Status, fusionData, chronyData) {
                const container = document.getElementById('dashboard-content');

                // Extract channel names for chart dropdowns from phase2 status
                if (phase2Status.channels) {
                    availableChannels = window.TIMESTD_UTILS.sortChannelsByFrequency(
                        Object.keys(phase2Status.channels)
                    );
                }

                // Store phase2 data globally for chart loading
                window.phase2ChannelStatus = phase2Status;
                window.fusionData = fusionData;
                window.chronyData = chronyData;

                // Phase 2 D_clock focused layout - zeroing in on UTC(NIST)
                container.innerHTML = `
                ${renderFusionPanel(fusionData)}
                ${renderChronyComparison(chronyData, fusionData)}
                ${renderAdvancedTimingVisualizations()}
                ${renderDClockChartPlaceholder()}
            `;

                // Load charts after DOM is ready
                setTimeout(() => {
                    loadCharts();
                }, 100);
            }

            function renderGpsdoStatus(data) {
                if (!data || !data.available) {
                    // Show startup/unavailable state
                    return `
                    <div class="gpsdo-panel startup">
                        <div class="gpsdo-header">
                            <div class="gpsdo-title">⚓ GPSDO Anchor Status</div>
                            <span class="gpsdo-state-badge red">

            // Helper: render station calibration card with convergence indicator
            function renderStationCalibration(station, location, mainColor, lightColor, textColor, freqs, cal) {
                const n = cal?.n_samples || 0;
                const offset = cal?.offset_ms;
                const uncertainty = cal?.uncertainty_ms || 1.0;

                // Convergence: 100% at 50 samples with low uncertainty
                const sampleProgress = Math.min(100, (n / 50) * 100);
                const uncertaintyProgress = Math.min(100, Math.max(0, (1 - uncertainty / 2) * 100));
                const convergence = Math.round((sampleProgress * 0.6) + (uncertaintyProgress * 0.4));

                const convergeLabel = convergence >= 95 ? '✓ Locked' :
                    convergence >= 50 ? 'Converging' :
                        n === 0 ? 'No signal' : 'Learning';
                const convergeColor = convergence >= 95 ? '#22c55e' :
                    convergence >= 50 ? '#eab308' : '#64748b';

                const freqBadges = freqs.map(f =>
                    `<span style="background: ${mainColor}33; padding: 3px 8px; border-radius: 4px; font-size: 11px; color: ${lightColor};">${f} MHz</span>`
                ).join('');

                const offsetStr = offset !== undefined ?
                    `${offset >= 0 ? '+' : ''}${offset.toFixed(2)} ms` : '—';

                return `
                <div style="background: ${mainColor}22; padding: 12px; border-radius: 8px; border-left: 3px solid ${mainColor};">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px;">
                        <div style="font-size: 13px; font-weight: 600; color: ${mainColor};">
                            ${station} <span style="font-weight: 400; color: ${lightColor};">(${location})</span>
                        </div>
                        <span style="font-size: 10px; color: ${convergeColor}; font-weight: 600;">${convergeLabel}</span>
                    </div>
                    <div style="display: flex; flex-wrap: wrap; gap: 6px;">
                        ${freqBadges}
                    </div>
                    <div style="margin-top: 10px; display: flex; justify-content: space-between; align-items: center;">
                        <div style="font-size: 11px; color: ${textColor};">
                            Offset: ${offsetStr}
                        </div>
                        <div style="font-size: 10px; color: ${lightColor};">
                            ${n} samples
                        </div>
                    </div>
                    <!-- Convergence progress bar -->
                    <div style="margin-top: 6px; height: 3px; background: ${mainColor}33; border-radius: 2px; overflow: hidden;">
                        <div style="width: ${convergence}%; height: 100%; background: ${convergence >= 95 ? '#22c55e' : mainColor}; transition: width 0.3s;"></div>
                    </div>
                </div>
            `;
            }

                            </div>
                            <div>
                                <div style="font-size: 32px; font-weight: 600; color: #f97316;">${rawStr}</div>
                                <div style="font-size: 11px; color: #6ee7b7; text-transform: uppercase;">Raw (uncal)</div>
                            </div>
                            <div>
                                <div style="font-size: 32px; font-weight: 600; color: #e0e0e0;">±${f.uncertainty_ms.toFixed(2)}</div>

                    <!-- 17 Broadcast Matrix with Convergence -->

                    { id: 'WWV 20 MHz', station: 'WWV', freq: 20, channel: 'WWV_20000' },
                    { id: 'WWV 25 MHz', station: 'WWV', freq: 25, channel: 'WWV_25000' },
                    // WWVH broadcasts (4) - shared frequencies with WWV
                    { id: 'WWVH 2.5 MHz', station: 'WWVH', freq: 2.5, channel: 'SHARED_2500' },
                    { id: 'WWVH 5 MHz', station: 'WWVH', freq: 5, channel: 'SHARED_5000' },
                    { id: 'WWVH 10 MHz', station: 'WWVH', freq: 10, channel: 'SHARED_10000' },
                    { id: 'WWVH 15 MHz', station: 'WWVH', freq: 15, channel: 'SHARED_15000' },
                    // CHU broadcasts (3)
                    { id: 'CHU 3.33 MHz', station: 'CHU', freq: 3.33, channel: 'CHU_3330' },
                    { id: 'CHU 7.85 MHz', station: 'CHU', freq: 7.85, channel: 'CHU_7850' },

                    let confidence = '—';
                    let snr = '—';
                    let lastUpdate = '—';
                    let isActive = false;

                    if (chData && chData.available) {

                            if (chData.last_updated) {

            function renderPhase2PipelineOverview(data) {

                const channelEntries = Object.entries(data.channels || {})
                    .filter(([_, status]) => status.available)
                    .sort((a, b) => {
                        const gradeOrder = { 'A': 0, 'B': 1, 'C': 2, 'D': 3, 'X': 4 };
                        return (gradeOrder[a[1].quality_grade] || 5) - (gradeOrder[b[1].quality_grade] || 5);

                const channelRows = channelEntries.map(([name, status]) => {

                    const dClockDisplay = hasDClock
                        ? `${dClockMs >= 0 ? '+' : ''}${dClockMs.toFixed(2)} ms`
                        : '—';

                    // Show alignment status relative to best D_clock
                    const alignmentStatus = hasDClock ? '✓ Aligned' : '⋯ Pending';
                    const alignmentColor = hasDClock ? '#22c55e' : '#64748b';

                    return `

                        <span style="font-size: 12px; color: ${alignmentColor};">${alignmentStatus}</span>

                    .filter(([_, status]) => !status.available)

                    <div style="display: grid; grid-template-columns: 140px 1fr 100px 60px 80px; 
                                align-items: center; gap: 12px; padding: 10px 12px; 
                                background: rgba(100,116,139,0.1); border-radius: 6px; border-left: 3px solid #475569;">

                                    font-size: 12px; text-align: center;">—</span>

                return `

                                <div style="font-size: 20px; font-weight: 600; color: #3b82f6;">${gradeAB}</div>

                    <div style="display: grid; grid-template-columns: 140px 1fr 100px 60px 80px;

                        <span>STATUS</span>

            function renderPrimaryReference(data) {

                const borderClass = displayQuality === 'TONE_LOCKED' || displayQuality === 'TONE_STABLE' ? '' :
                    displayQuality === 'NTP_SYNCED' ? 'ntp' :

                return `

                        </div>
                        <div style="margin-top: 8px; font-size: 12px; color: #94a3b8;">
                            Stations: ${c.stations.join(', ')} | 
                            ${c.verified ? '✓ Verified' : '○ Unverified'} |
                            Last 5 minutes
                        </div>
                    </div>
                `;
                }

                // Get latest result per channel
                const latestByChannel = {};
                for (const r of data.results) {
                    if (!latestByChannel[r.channel] || new Date(r.timestamp) > new Date(latestByChannel[r.channel].timestamp)) {
                        latestByChannel[r.channel] = r;
                    }
                }

                const rows = Object.values(latestByChannel).map(r => {
                    const hasOffset = r.utc_nist_offset_ms !== null && r.confidence > 0.3;
                    const verifiedIcon = hasOffset ? (r.utc_nist_verified ? '✓' : '○') : '';
                    const verifiedClass = r.utc_nist_verified ? 'color: #22c55e;' : 'color: #94a3b8;';
                    const confColor = r.confidence > 0.7 ? '#22c55e' : r.confidence > 0.5 ? '#eab308' : r.confidence > 0.3 ? '#f97316' : '#94a3b8';
                    const offsetDisplay = hasOffset
                        ? `${r.utc_nist_offset_ms >= 0 ? '+' : ''}${r.utc_nist_offset_ms.toFixed(2)} ms`
                        : '<span style="color: #64748b; font-style: italic;">mode only</span>';

                    return `
                    <tr>
                        <td style="font-weight: 600;">${r.frequency_mhz} MHz</td>
                        <td>${r.station}</td>
                        <td>${r.mode}</td>
                        <td>${r.n_hops}</td>
                        <td>${r.propagation_delay_ms.toFixed(2)} ms</td>
                        <td style="${verifiedClass} font-weight: 600;">${offsetDisplay} ${verifiedIcon}</td>
                        <td><span style="color: ${confColor};">${(r.confidence * 100).toFixed(0)}%</span></td>
                        <td style="color: #94a3b8; font-size: 11px;">${UTCTime.formatTime(r.timestamp)} UTC</td>
                    </tr>
                `;
                }).join('');

                return `
                <div class="propagation-section" style="margin-bottom: 20px;">
                    <div class="section-header">
                        <h2 class="section-title">🎯 UTC(NIST) Back-Calculation</h2>
                        <div class="section-subtitle">Virtual Atomic Clock - ${data.count} measurements from ${new Set(data.results.map(r => r.station)).size} stations</div>
                    </div>
                    
                    ${combinedBanner}
                    
                    <div style="font-size: 13px; color: #94a3b8; margin-bottom: 8px;">Individual Channel Measurements:</div>
                    <table style="width: 100%; border-collapse: collapse; font-size: 13px;">

                                <th style="padding: 10px;">Freq</th>
                                <th style="padding: 10px;">Station</th>
                                <th style="padding: 10px;">Mode</th>
                                <th style="padding: 10px;">Hops</th>

                                <th style="padding: 10px;">UTC(NIST) Offset</th>
                                <th style="padding: 10px;">Confidence</th>
                                <th style="padding: 10px;">Last Update</th>

            function renderChannelTable(data, phase2Status) {
                // Sort channels by frequency
                const sortedChannels = window.TIMESTD_UTILS.sortByChannelFrequency(data.channels, 'channel');
                const gradeColors = { 'A': '#22c55e', 'B': '#3b82f6', 'C': '#eab308', 'D': '#f97316', 'X': '#ef4444' };

                const rows = sortedChannels.map(ch => {
                    const healthClass = ch.health_score >= 90 ? 'excellent' :
                        ch.health_score >= 70 ? 'good' :
                            ch.health_score >= 50 ? 'fair' : 'poor';

                    const qualityClass = ch.quality.toLowerCase().replace('_', '-');

                    // Format jitter - show "stabilizing" if > 1000ms
                    const jitterDisplay = ch.jitter_ms > 1000 ?
                        '<span style="color: #94a3b8;">stabilizing</span>' :
                        `${ch.jitter_ms.toFixed(3)} ms`;

                    // Format drift - highlight if significant
                    const driftDisplay = Math.abs(ch.drift_ms) > 10 ?
                        `<span style="color: #ef4444;">${ch.drift_ms.toFixed(3)} ms</span>` :
                        `${ch.drift_ms.toFixed(3)} ms`;

                    // Get Phase 2 D_clock data for this channel
                    const phase2Ch = phase2Status?.channels?.[ch.channel];
                    let dClockDisplay = '<span style="color: #64748b;">—</span>';
                    let gradeDisplay = '<span style="color: #64748b;">—</span>';
                    let stationDisplay = '<span style="color: #64748b;">—</span>';
                    let modeDisplay = '<span style="color: #64748b;">—</span>';

                    if (phase2Ch && phase2Ch.available && phase2Ch.d_clock_ms !== undefined) {
                        const dClockMs = phase2Ch.d_clock_ms;
                        const grade = phase2Ch.quality_grade || 'X';
                        const gradeColor = gradeColors[grade] || '#64748b';

                        dClockDisplay = `<span style="font-family: monospace; color: ${gradeColor}; font-weight: 600;">

                        gradeDisplay = `<span style="background: ${gradeColor}; color: #fff; padding: 2px 8px;

                        <td style="text-align: right;">${dClockDisplay}</td>

                return `

                    <table>
                        <thead>

            let userSelectedChannel = null;
            let userSelectedHours = null;
            let userSelectedDate = null;

            function loadCharts() {
                // Initialize date picker
                const datePicker = document.getElementById('dashboard-date');
                if (datePicker) {
                    // Default to today if not set, or persist user selection
                    if (!userSelectedDate) userSelectedDate = new Date().toISOString().slice(0, 10);
                    datePicker.value = userSelectedDate;
                }

                // Populate D_clock channel dropdown, preserving user selection
                populateDClockDropdown();
                // Only auto-select if user hasn't made a selection yet
                if (!userSelectedChannel) {
                    autoSelectDClockChannel();
                } else {
                    // Restore user's previous selection
                    const select = document.getElementById('dclock-channel-select');
                    const hoursSelect = document.getElementById('dclock-hours-select');
                    if (select && userSelectedChannel) select.value = userSelectedChannel;
                    if (hoursSelect && userSelectedHours) hoursSelect.value = userSelectedHours;
                    loadDClockChart();

                loadFusionChart();
                loadAdvancedVisualizations();

                const datePicker = document.getElementById('dashboard-date');

                    userSelectedDate = datePicker.value;

            function populateChannelDropdown() {
                const select = document.getElementById('drift-channel-select');
                if (!select || availableChannels.length === 0) return;

                // Keep "All Channels" option
                select.innerHTML = '<option value="all">All Channels</option>';

                // Add each channel
                availableChannels.forEach(ch => {
                    const option = document.createElement('option');
                    option.value = ch;
                    option.textContent = ch;
                    select.appendChild(option);
                });
            }

            function populateDClockDropdown() {
                const select = document.getElementById('dclock-channel-select');
                if (!select) return;

                // Keep "Select Broadcast" option
                select.innerHTML = '<option value="">Select Broadcast...</option>';

                // Add each broadcast (sorted by frequency)
                BROADCASTS.forEach(b => {
                    const option = document.createElement('option');
                    // Backend uses STATION_KILOHERTZ format (e.g., WWV_2500, CHU_14670)
                    const khz = Math.round(b.freq * 1000);
                    const broadcastKey = `${b.name}_${khz}`;
                    option.value = broadcastKey;
                    option.textContent = `${b.name} ${b.freq} MHz`;
                    select.appendChild(option);
                });
            }

            function autoSelectDClockChannel() {
                const select = document.getElementById('dclock-channel-select');
                if (!select) return;

                // Auto-select first broadcast (WWV 2.5 MHz)
                if (BROADCASTS.length > 0) {
                    const first = BROADCASTS[0];
                    select.value = `${first.name}_${first.freq}`;
                    loadDClockChart();
                }
            }

                const broadcastSelect = document.getElementById('dclock-channel-select');
                const hoursSelect = document.getElementById('dclock-hours-select');
                const chartDiv = document.getElementById('dclock-chart');
                const statsDiv = document.getElementById('dclock-stats');

                if (!chartDiv) return;

                const selectedBroadcast = broadcastSelect ? broadcastSelect.value : '';
                const hours = hoursSelect ? parseInt(hoursSelect.value) : 24;
                const datePicker = document.getElementById('dashboard-date');
                const selectedDate = datePicker ? datePicker.value : new Date().toISOString().slice(0, 10);

                // Save user's selection for persistence across refresh
                if (selectedBroadcast) userSelectedChannel = selectedBroadcast;
                if (hoursSelect) userSelectedHours = hoursSelect.value;
                if (datePicker) userSelectedDate = datePicker.value;

                if (!selectedBroadcast) {
                    chartDiv.innerHTML = '<div style="height: 100%; display: flex; align-items: center; justify-content: center; color: #64748b;">Select a broadcast to view D_clock measurements</div>';
                    return;
                }

                // Format broadcast name for display (e.g., "WWV_2500" -> "WWV 2.5 MHz")
                const parts = selectedBroadcast.split('_');
                const station = parts[0];
                const freqKHz = parseInt(parts[1]);
                const freqMHz = freqKHz / 1000;
                const displayName = `${station} ${freqMHz} MHz`;

                try {
                    // Use broadcasts/history endpoint which has D_clock data per broadcast
                    const dateStr = selectedDate.replace(/-/g, '');
                    const response = await fetch(`/api/v1/broadcasts/history?date=${dateStr}`);
                    const json = await response.json();

                    const broadcastData = json.history[selectedBroadcast];

                    if (!broadcastData || !broadcastData.data || broadcastData.data.length === 0) {
                        chartDiv.innerHTML = `<div style="height: 100%; display: flex; align-items: center; justify-content: center; color: #94a3b8;">No D_clock data available for ${displayName} on ${selectedDate}</div>`;
                        if (statsDiv) statsDiv.innerHTML = '<div style="text-align: center; color: #94a3b8;">No data</div>';
                        return;
                    }

                    // Determine reference time (end of selected day or NOW if today)
                    const todayStr = new Date().toISOString().slice(0, 10);
                    let referenceTime = Date.now();
                    if (selectedDate !== todayStr) {
                        const d = new Date(selectedDate);
                        d.setUTCHours(23, 59, 59, 999);
                        referenceTime = d.getTime();
                    }

                    // Filter to points with D_clock data and within time window
                    const cutoff = referenceTime - (hours * 3600 * 1000);
                    const measurements = broadcastData.data
                        .filter(pt => pt.d_clock !== undefined && pt.d_clock !== null)
                        .filter(pt => (pt.t * 1000) > cutoff && (pt.t * 1000) <= referenceTime)
                        .sort((a, b) => a.t - b.t);

                    if (measurements.length === 0) {
                        chartDiv.innerHTML = `<div style="height: 100%; display: flex; align-items: center; justify-content: center; color: #94a3b8;">No D_clock data available for ${displayName} in last ${hours}h of ${selectedDate}</div>`;
                        if (statsDiv) statsDiv.innerHTML = '<div style="text-align: center; color: #94a3b8;">No data</div>';
                        return;
                    }

                    // Build main D_clock trace
                    const x = measurements.map(m => new Date(m.t * 1000));
                    const y = measurements.map(m => m.d_clock);
                    const hoverText = measurements.map(m =>
                        `D_clock: ${m.d_clock >= 0 ? '+' : ''}${m.d_clock.toFixed(3)} ms<br>` +
                        `Mode: ${m.mode || 'N/A'}<br>` +
                        `Uncertainty: ±${(m.unc || 0).toFixed(1)} ms` +
                        (m.exclusion ? '<br><span style="color:red">EXCLUSION ZONE</span>' : '')
                    );

                    const traces = [{
                        x: x,
                        y: y,
                        mode: 'lines+markers',
                        name: 'D_clock',
                        line: { color: '#3b82f6', width: 2 },
                        marker: {
                            size: 6,
                            color: measurements.map(m => m.exclusion ? '#ef4444' : '#3b82f6'),
                            line: { color: '#fff', width: 1 }
                        },
                        hovertext: hoverText,
                        hoverinfo: 'text+x'
                    }];

                    // Add uncertainty band if available
                    const hasUncertainty = measurements.some(m => m.unc !== undefined && m.unc !== null);
                    if (hasUncertainty) {
                        const yUpper = measurements.map(m => m.d_clock + (m.unc || 0));
                        const yLower = measurements.map(m => m.d_clock - (m.unc || 0));

                        traces.push({
                            x: [...x, ...x.slice().reverse()],
                            y: [...yUpper, ...yLower.reverse()],
                            fill: 'toself',
                            fillcolor: 'rgba(59, 130, 246, 0.1)',
                            line: { color: 'transparent' },
                            name: 'Uncertainty',
                            showlegend: false,
                            hoverinfo: 'skip'
                        });
                    }

                    // Identify Exclusion Zones (contiguous blocks where exclusion=true)
                    const shapes = [];
                    let exStart = null;

                    measurements.forEach((m, i) => {
                        if (m.exclusion && !exStart) {
                            exStart = m.t; // Start of zone
                        } else if ((!m.exclusion || i === measurements.length - 1) && exStart) {
                            // End of zone
                            const exEnd = m.exclusion ? m.t : measurements[i - 1].t;
                            // Minimum 60s width for visibility
                            const finalEnd = Math.max(exEnd, exStart + 60);

                            shapes.push({
                                type: 'rect',
                                xref: 'x',
                                yref: 'paper',
                                x0: new Date(exStart * 1000),
                                x1: new Date(finalEnd * 1000),
                                y0: 0,
                                y1: 1,
                                fillcolor: 'rgba(239, 68, 68, 0.15)',
                                line: { width: 0 }
                            });
                            exStart = null;
                        }
                    });

                    const layout = {
                        paper_bgcolor: 'transparent',
                        plot_bgcolor: 'transparent',
                        margin: { l: 60, r: 30, t: 20, b: 50 },
                        xaxis: {
                            gridcolor: '#334155',
                            tickcolor: '#64748b',
                            tickfont: { color: '#94a3b8' },
                            title: { text: 'Time (UTC)', font: { color: '#94a3b8', size: 12 } }
                        },
                        yaxis: {
                            gridcolor: '#334155',
                            tickcolor: '#64748b',
                            tickfont: { color: '#94a3b8' },
                            title: { text: 'D_clock (ms)', font: { color: '#94a3b8', size: 12 } },
                            zeroline: true,
                            zerolinecolor: '#94a3b8',
                            zerolinewidth: 1
                        },
                        legend: {
                            font: { color: '#e0e0e0' },
                            bgcolor: 'rgba(30, 41, 59, 0.8)'
                        },
                        hovermode: 'closest',
                        shapes: shapes
                    };

                    Plotly.newPlot(chartDiv, traces, layout, { responsive: true, displayModeBar: false });

                    // Calculate and update stats display
                    if (statsDiv) {
                        const dClockValues = measurements.map(m => m.d_clock);
                        const mean = dClockValues.reduce((a, b) => a + b, 0) / dClockValues.length;
                        const variance = dClockValues.reduce((sum, v) => sum + Math.pow(v - mean, 2), 0) / dClockValues.length;
                        const std = Math.sqrt(variance);
                        const min = Math.min(...dClockValues);
                        const max = Math.max(...dClockValues);
                        const exclusionCount = measurements.filter(m => m.exclusion).length;

                        statsDiv.innerHTML = `
                        <div style="text-align: center;">
                            <div style="font-size: 13px; color: #94a3b8;">Mean</div>
                            <div style="font-size: 18px; font-weight: 600; color: #e0e0e0;">${mean.toFixed(3)} ms</div>
                        </div>
                        <div style="text-align: center;">
                            <div style="font-size: 13px; color: #94a3b8;">Std Dev</div>
                            <div style="font-size: 18px; font-weight: 600; color: #e0e0e0;">±${std.toFixed(3)} ms</div>
                        </div>
                        <div style="text-align: center;">
                            <div style="font-size: 13px; color: #94a3b8;">Range</div>
                            <div style="font-size: 18px; font-weight: 600; color: #e0e0e0;">${min.toFixed(3)} to ${max.toFixed(3)}</div>
                        </div>
                        <div style="text-align: center;">
                            <div style="font-size: 13px; color: #94a3b8;">Samples</div>
                            <div style="font-size: 18px; font-weight: 600; color: #e0e0e0;">${measurements.length}</div>
                        </div>
                        ${exclusionCount > 0 ? `
                        <div style="text-align: center;">
                            <div style="font-size: 13px; color: #ef4444;">Exclusions</div>
                            <div style="font-size: 18px; font-weight: 600; color: #ef4444;">${exclusionCount}</div>
                        </div>` : ''}
                    `;
                    }

                } catch (err) {
                    console.error('Failed to load D_clock chart:', err);
                    chartDiv.innerHTML = `<div style="height: 100%; display: flex; align-items: center; justify-content: center; color: #ef4444;">Error loading D_clock data: ${err.message}</div>`;
                }
            }

                            if (data.available && data.metrics && data.metrics.length > 0) {

            function checkAlerts(primaryRef, healthSummary, gpsdoStatus) {
                const banner = document.getElementById('alert-banner');
                const title = document.getElementById('alert-title');
                const message = document.getElementById('alert-message');

                const avgDrift = parseFloat(healthSummary.drift.average_ms);
                const isToneBased = primaryRef.is_tone_based ||
                    primaryRef.source_type?.includes('startup') ||
                    primaryRef.source_type?.includes('wwv') ||
                    primaryRef.source_type?.includes('chu');

                // Check GPSDO status first - highest priority alerts
                if (gpsdoStatus && gpsdoStatus.available) {
                    if (gpsdoStatus.anchor_state === 'REANCHOR_REQUIRED') {
                        banner.className = 'alert-banner visible';
                        title.textContent = 'Critical: GPSDO Re-anchor Required';
                        message.textContent = 'Discontinuity detected in sample stream. Fresh anchor being established...';
                        return;
                    }

                    if (gpsdoStatus.anchor_state === 'HOLDOVER') {
                        banner.className = 'alert-banner visible warning';
                        title.textContent = 'Warning: GPSDO in Holdover';
                        message.textContent = `Drift alarm triggered - data being flagged. GPSDO may have lost lock.`;
                        return;
                    }
                }

                // Check for critical issues
                if (!primaryRef.available) {
                    banner.className = 'alert-banner visible';
                    title.textContent = 'Critical: No Time Reference';
                    message.textContent = 'No time reference available. Check core recorder and tone detection.';
                    return;
                }

                // Wall clock with no tone history is critical
                if (primaryRef.quality === 'WALL_CLOCK' && !isToneBased) {
                    banner.className = 'alert-banner visible';
                    title.textContent = 'Critical: Using Unsynchronized Clock';
                    message.textContent = 'No tone reference established. Timing precision is ±seconds. Check propagation and tone detection.';
                    return;
                }

                // Excessive drift is always critical regardless of source
                if (avgDrift > 50) {
                    banner.className = 'alert-banner visible';
                    title.textContent = 'Critical: Excessive Drift';
                    message.textContent = `Average drift is ${healthSummary.drift.average_ms}ms. Check system clock and RTP streams.`;
                    return;
                }

                // Tone-based timing with good drift - no warning needed!
                // This was the key missing case
                if (isToneBased && avgDrift < 5) {
                    // No alert - everything is working well
                    banner.className = 'alert-banner';
                    return;
                }

                // NTP-only with no tone-based channels is a soft warning
                if (!isToneBased && healthSummary.tone_locked_channels === 0) {
                    banner.className = 'alert-banner visible warning';
                    title.textContent = 'Info: Using NTP Timing';
                    message.textContent = `All channels using NTP (±10ms). No tone detected yet - normal during poor propagation. RTP drift: ±${avgDrift.toFixed(2)}ms`;
                    return;
                }

                // System stabilizing after startup
                if (primaryRef.age_seconds < 120) {
                    banner.className = 'alert-banner visible warning';
                    title.textContent = 'Info: System Stabilizing';
                    message.textContent = 'Recently started - timing measurements stabilizing. Data quality will improve.';
                    return;
                }

                // No critical alerts
                banner.className = 'alert-banner';
            }

            function formatAge(seconds) {
                if (seconds < 0) return '0s';
                const s = Math.floor(seconds);
                if (s < 60) return `${s}s`;
                if (s < 3600) return `${Math.floor(s / 60)}m ${s % 60}s`;
                return `${Math.floor(s / 3600)}h ${Math.floor((s % 3600) / 60)}m`;
            }

            async function loadKalmanFunnel() {
                const container = document.getElementById('kalman-funnel-chart');
                if (!container) return;

                const minutesSelect = document.getElementById('funnel-minutes');
                const minutes = minutesSelect ? parseInt(minutesSelect.value) : 1440;

                try {
                    const response = await fetch(`/api/v1/timing/kalman-funnel?minutes=${minutes}`);
                    const fusionData = await response.json();

                    if (!fusionData.history || fusionData.history.length === 0) {
                        container.innerHTML = '<div style="display: flex; align-items: center; justify-content: center; height: 100%; color: #64748b;">No fusion data available</div>';
                        return;
                    }

                    const cutoffTime = Date.now() / 1000 - (parseInt(minutes) * 60);
                    const filteredHistory = fusionData.history.filter(p => p.timestamp >= cutoffTime);

                    const points = filteredHistory.map(p => ({
                        timestamp: p.timestamp,
                        offset_ms: p.d_clock_fused_ms,
                        uncertainty_ms: p.uncertainty_ms || 1.0,
                        status: p.uncertainty_ms < 2.0 ? 'LOCKED' : 'HOLD',
                        channel: 'Fusion',
                        station: 'FUSED'
                    }));

                    if (points.length === 0) {
                        container.innerHTML = '<div style="display: flex; align-items: center; justify-content: center; height: 100%; color: #64748b;">No data in selected time window</div>';
                        return;
                    }

                    if (!kalmanChart) {
                        kalmanChart = new KalmanFunnelChart('kalman-funnel-chart', {
                            timeWindowMinutes: parseInt(minutes),
                            yAxisRange: [-5, 5]
                        });
                    }

                    kalmanChart.update(points);
                } catch (err) {
                    console.error('Error loading Kalman funnel:', err);
                    container.innerHTML = `<div style="display: flex; align-items: center; justify-content: center; height: 100%; color: #ef4444;">Error: ${err.message}</div>`;
                }
            }

            async function loadConstellation() {
                const container = document.getElementById('constellation-chart');
                if (!container) return;

                try {
                    if (!constellationChart) {
                        constellationChart = new ConstellationRadar('constellation-chart', {
                            maxRadius: 3
                        });
                    }

                    const fusionResponse = await fetch('/api/v1/timing/fusion');
                    const fusionData = await fusionResponse.json();
                    const calibration = fusionData.calibration || {};

                    const response = await fetch('/api/v1/timing/constellation');
                    const data = await response.json();

                    if (data && data.stations) {
                        data.stations = data.stations.map(st => {
                            const stationCal = calibration[st.base_station];
                            const calOffset = stationCal ? stationCal.offset_ms : 0;
                            return {
                                ...st,
                                error_ms: st.error_ms + calOffset
                            };
                        });
                    }

                    constellationChart.update(data || { stations: [] });
                } catch (err) {
                    console.error('Error loading constellation:', err);
                    if (constellationChart) {
                        constellationChart.update({ stations: [] });
                    }
                }
            }

            async function loadProbabilityPeak() {
                const container = document.getElementById('probability-peak-chart');
                const stateIndicator = document.getElementById('consensus-state');
                if (!container) return;

                try {
                    const response = await fetch('/api/v1/timing/fusion');
                    const fusionData = await response.json();

                    if (!fusionData.history || fusionData.history.length === 0) {
                        container.innerHTML = '<div style="display: flex; align-items: center; justify-content: center; height: 100%; color: #64748b;">No fusion data available</div>';
                        if (stateIndicator) {
                            stateIndicator.textContent = 'No Data';
                            stateIndicator.style.background = 'rgba(100,116,139,0.2)';
                            stateIndicator.style.color = '#94a3b8';
                        }
                        return;
                    }

                    const cutoffTime = Date.now() / 1000 - 600;
                    const recentHistory = fusionData.history.filter(p => p.timestamp >= cutoffTime);

                    const uncertainties = recentHistory.map(p => p.uncertainty_ms || 3);
                    const avgUncertainty = uncertainties.reduce((a, b) => a + b, 0) / uncertainties.length;
                    const state = avgUncertainty < 2 ? 'LOCKED' : avgUncertainty < 4 ? 'CONVERGING' : 'DIVERGENT';

                    if (stateIndicator) {
                        const stateStyles = {
                            'LOCKED': { bg: 'rgba(34,197,94,0.2)', color: '#22c55e', text: '✓ Locked' },
                            'CONVERGING': { bg: 'rgba(59,130,246,0.2)', color: '#3b82f6', text: '◐ Converging' },
                            'DIVERGENT': { bg: 'rgba(249,115,22,0.2)', color: '#f97316', text: '⚠ Divergent' }
                        };
                        const style = stateStyles[state] || stateStyles['DIVERGENT'];
                        stateIndicator.textContent = style.text;
                        stateIndicator.style.background = style.bg;
                        stateIndicator.style.color = style.color;
                    }

                    const estimates = recentHistory.map(p => ({
                        offset: p.d_clock_fused_ms,
                        uncertainty: p.uncertainty_ms || 1.0,
                        station: 'FUSED',
                        weight: 1.0
                    }));

                    if (!probabilityChart) {
                        probabilityChart = new ProbabilityPeak('probability-peak-chart', {
                            xRange: [-3, 3],
                            bandwidth: 0.3
                        });
                    }

                    probabilityChart.update(estimates);
                } catch (err) {
                    console.error('Error loading probability peak:', err);
                    container.innerHTML = `<div style="display: flex; align-items: center; justify-content: center; height: 100%; color: #ef4444;">Error: ${err.message}</div>`;
                }
            }

        </script>
    </div><!-- end container -->
    <script src="/utils/utc-time.js"></script>
    <script src="/components/timing-visualizations.js"></script>
    <script src="/components/theme-toggle.js"></script>
    <script src="/components/navigation.js"></script>
    <script>
        // Initialize after all dependencies are loaded
        loadDashboard();
        startAutoRefresh();

        // Load advanced visualizations after a short delay to ensure DOM is ready
        setTimeout(loadAdvancedVisualizations, 500);
    </script>
