<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Logs - hf-timestd</title>
    <link rel="stylesheet" href="/static/css/styles.css">
    <style>
        .log-container {
            background: #0f172a;
            border-radius: 6px;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            height: 600px;
            overflow-y: auto;
            padding: 16px;
            border: 1px solid rgba(148, 163, 184, 0.1);
            color: #e2e8f0;
        }

        .log-entry {
            padding: 2px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            gap: 12px;
        }

        .log-time {
            color: #64748b;
            white-space: nowrap;
            min-width: 150px;
        }

        .log-level {
            font-weight: bold;
            min-width: 60px;
        }

        .level-INFO {
            color: #3b82f6;
        }

        .level-WARNING {
            color: #f59e0b;
        }

        .level-ERROR {
            color: #ef4444;
        }

        .level-DEBUG {
            color: #94a3b8;
        }

        .log-message {
            white-space: pre-wrap;
            word-break: break-all;
        }

        .controls-bar {
            background: #1e293b;
            padding: 16px;
            border-radius: 6px;
            margin-bottom: 16px;
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
            align-items: center;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .control-label {
            font-size: 11px;
            color: #94a3b8;
            font-weight: 600;
            text-transform: uppercase;
        }

        select,
        input {
            background: #0f172a;
            border: 1px solid rgba(148, 163, 184, 0.2);
            color: #e2e8f0;
            padding: 8px;
            border-radius: 4px;
            font-size: 14px;
        }

        .refresh-toggle {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
        }

        .search-box {
            flex-grow: 1;
        }

        .search-box input {
            width: 100%;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="header">
            <h1>📋 System Logs</h1>
            <div class="header-subtitle">Real-time service logs</div>
            <nav class="nav">
                <a href="/" class="nav-link">Overview</a>
                <a href="/static/health.html" class="nav-link">Health</a>
                <span class="nav-divider"></span>
                <a href="/static/metrology.html" class="nav-link">⏱️ Timing</a>
                <a href="/static/timing-validation.html" class="nav-link">Validation</a>
                <a href="/static/chrony.html" class="nav-link">🕑 Chrony</a>
                <span class="nav-divider"></span>
                <a href="/static/phase.html" class="nav-link">📡 Phase</a>
                <a href="/static/ionosphere.html" class="nav-link">🔬 Observatory</a>
                <a href="/static/ionogram.html" class="nav-link">📻 Ionogram</a>
                <a href="/static/dtec.html" class="nav-link">⚡ dTEC</a>
                <a href="/static/test_signal.html" class="nav-link">📡 Test Signal</a>
                <a href="/static/grape.html" class="nav-link">&#x1F347; GRAPE</a>
                <span class="nav-divider"></span>
                <a href="/static/docs.html" class="nav-link">📚 Docs</a>
                <a href="/static/logs.html" class="nav-link active">Logs</a>
            </nav>
        </div>

        <div id="error-container" style="display: none;"></div>

        <div class="controls-bar">
            <div class="control-group">
                <span class="control-label">Service</span>
                <select id="service-select">
                    <option value="fusion">Fusion</option>
                    <option value="metrology">Metrology (L1)</option>
                    <option value="physics">Physics (L2)</option>
                    <option value="l2-calibration">L2 Calibration</option>
                    <option value="core">Core Recorder</option>
                    <option value="vtec">VTEC</option>
                    <option value="web-api">Web API</option>
                    <option value="radiod-monitor">Radiod Monitor</option>
                </select>
            </div>

            <div class="control-group">
                <span class="control-label">Time Range</span>
                <select id="time-select" onchange="toggleLogsCustomDate()">
                    <option value="1h">Last 1 Hour</option>
                    <option value="6h">Last 6 Hours</option>
                    <option value="24h">Last 24 Hours</option>
                    <option value="7d">Last 7 Days</option>
                    <option value="custom">Custom range…</option>
                </select>
            </div>
            <div class="control-group" id="logsCustomDateGroup" style="display:none">
                <span class="control-label">Start (UTC)</span>
                <input type="datetime-local" id="logsCustomStart" style="padding:4px 8px; font-size:12px; background:var(--surface); border:1px solid var(--border); border-radius:4px; color:var(--text);">
            </div>
            <div class="control-group" id="logsCustomEndGroup" style="display:none">
                <span class="control-label">End (UTC)</span>
                <input type="datetime-local" id="logsCustomEnd" style="padding:4px 8px; font-size:12px; background:var(--surface); border:1px solid var(--border); border-radius:4px; color:var(--text);">
            </div>

            <div class="control-group">
                <span class="control-label">Min Level</span>
                <select id="level-select">
                    <option value="">All Levels</option>
                    <option value="INFO">INFO+</option>
                    <option value="WARNING">WARNING+</option>
                    <option value="ERROR">ERROR only</option>
                </select>
            </div>

            <div class="control-group search-box">
                <span class="control-label">Search</span>
                <input type="text" id="search-input" placeholder="Filter logs...">
            </div>

            <div class="control-group">
                <span class="control-label">Auto-Refresh</span>
                <label class="refresh-toggle">
                    <input type="checkbox" id="auto-refresh" checked>
                    <span>On (5s)</span>
                </label>
            </div>

            <button onclick="loadLogs()" style="margin-top: 16px;">Refresh Now</button>
        </div>

        <div class="log-container" id="log-display">
            <div class="loading">Loading logs...</div>
        </div>

        <div style="margin-top: 8px; font-size: 11px; color: #64748b; text-align: right;">
            Showing <span id="log-count">0</span> lines
        </div>
    </div>

    <script src="/static/js/common.js"></script>
    <script>
        let isAutoScrolling = true;
        const logDisplay = document.getElementById('log-display');

        // Detect if user scrolls up to disable auto-scroll
        logDisplay.addEventListener('scroll', () => {
            const isAtBottom = logDisplay.scrollHeight - logDisplay.scrollTop <= logDisplay.clientHeight + 50;
            isAutoScrolling = isAtBottom;
        });

        function toggleLogsCustomDate() {
            const isCustom = document.getElementById('time-select').value === 'custom';
            document.getElementById('logsCustomDateGroup').style.display = isCustom ? '' : 'none';
            document.getElementById('logsCustomEndGroup').style.display = isCustom ? '' : 'none';
            if (isCustom && !document.getElementById('logsCustomStart').value) {
                const now = new Date();
                const yesterday = new Date(now.getTime() - 86400000);
                document.getElementById('logsCustomStart').value = yesterday.toISOString().slice(0, 16);
                document.getElementById('logsCustomEnd').value = now.toISOString().slice(0, 16);
            }
        }

        async function loadLogs() {
            const service = document.getElementById('service-select').value;
            const range = document.getElementById('time-select').value;
            const level = document.getElementById('level-select').value;
            const search = document.getElementById('search-input').value.toLowerCase();

            try {
                // Build query params
                const params = new URLSearchParams({
                    service: service,
                    lines: 500,
                });
                if (range === 'custom') {
                    const cs = document.getElementById('logsCustomStart').value;
                    const ce = document.getElementById('logsCustomEnd').value;
                    if (cs) params.append('since', cs.replace('T', ' '));
                    if (ce) params.append('until', ce.replace('T', ' '));
                } else {
                    params.append('since', range);
                }
                if (level) params.append('level', level);

                const data = await api.get(`/logs/?${params.toString()}`);

                // Check for backend error (e.g., journalctl permission denied)
                if (data.error) {
                    logDisplay.innerHTML = `<div style="padding: 20px; text-align: center; color: #f59e0b;">
                        <div style="font-size: 16px; margin-bottom: 8px;">⚠️ ${escapeHtml(data.error)}</div>
                        <div style="font-size: 12px; color: #64748b;">Run: <code>sudo usermod -aG systemd-journal timestd</code> then restart the web-api service</div>
                    </div>`;
                    document.getElementById('log-count').textContent = 0;
                    return;
                }

                // Filter client-side for search (journalctl search is limited via grep)
                let logs = data.logs;
                if (search) {
                    logs = logs.filter(log =>
                        log.message.toLowerCase().includes(search) ||
                        log.level.toLowerCase().includes(search)
                    );
                }

                if (logs.length === 0) {
                    logDisplay.innerHTML = '<div style="padding: 20px; text-align: center; color: #64748b;">No logs found for this criteria.</div>';
                    document.getElementById('log-count').textContent = 0;
                    return;
                }

                // Render logs
                const html = logs.map(log => `
                    <div class="log-entry">
                        <span class="log-time">${formatLogTime(log.timestamp)}</span>
                        <span class="log-level level-${log.level}">${log.level}</span>
                        <span class="log-message">${escapeHtml(log.message)}</span>
                    </div>
                `).join('');

                logDisplay.innerHTML = html;
                document.getElementById('log-count').textContent = logs.length;

                // Auto-scroll to bottom if enabled
                if (isAutoScrolling) {
                    logDisplay.scrollTop = logDisplay.scrollHeight;
                }

            } catch (error) {
                console.error('Failed to load logs:', error);
                // Don't overwrite if auto-refreshing and error is transient
                if (!document.getElementById('log-display').children.length) {
                    showError(`Failed to load logs: ${error.message}`);
                }
            }
        }

        function formatLogTime(isoString) {
            if (!isoString) return '-';
            try {
                const date = new Date(isoString);
                return date.toISOString().replace('T', ' ').substring(0, 19);
            } catch (e) {
                return isoString;
            }
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Initialize with auto-refresh
        loadLogs();

        const refreshInterval = setInterval(() => {
            if (document.getElementById('auto-refresh').checked) {
                loadLogs();
            }
        }, 5000);

        // Add event listeners for controls
        document.getElementById('service-select').addEventListener('change', () => {
            logDisplay.innerHTML = '<div class="loading">Loading logs...</div>';
            isAutoScrolling = true;
            loadLogs();
        });

        ['time-select', 'level-select'].forEach(id => {
            document.getElementById(id).addEventListener('change', loadLogs);
        });

        // Debounce search
        let searchTimeout;
        document.getElementById('search-input').addEventListener('input', () => {
            clearTimeout(searchTimeout);
            searchTimeout = setTimeout(loadLogs, 300);
        });
    </script>
</body>

</html>
