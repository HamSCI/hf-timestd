# hf-timestd deploy manifest — declares how this client gets from
# repo source to its production location.  Conforms to the HamSCI
# client contract v0.1 (sigmond/docs/CLIENT-CONTRACT.md).
#
# Sigmond reads this file to install/update hf-timestd; the existing
# scripts/deploy.sh is the standalone-safe equivalent that does the
# same work without sigmond present.

[package]
name             = "hf-timestd"
version          = "7.1.0"
description      = "HF Time Standard Analysis — WWV/WWVH/CHU/BPM timing via ka9q-radio"
contract_version = "0.8"
license          = "MIT"

# ---------------------------------------------------------------------------
# Configuration interview (CONTRACT-v0.5 §14).  Sigmond invokes these when
# the operator runs `smd config init|edit hf-timestd`.  The scripts honor
# the §14.3 env var bag (STATION_*, SIGMOND_*) as prompt defaults.
# ---------------------------------------------------------------------------

[contract.config]
init = "scripts/setup-station.sh"
edit = "scripts/config-review.sh"

# ---------------------------------------------------------------------------
# Build phase: install Python package into a venv at /opt/git/sigmond/hf-timestd/venv.
# Sigmond invokes these in order from the repo root.
# ---------------------------------------------------------------------------

[build]
steps = [
    "python3 -m venv /opt/git/sigmond/hf-timestd/venv",
    "/opt/git/sigmond/hf-timestd/venv/bin/pip install --upgrade pip setuptools wheel",
    "/opt/git/sigmond/hf-timestd/venv/bin/pip install -e .",
    # pyLAP is intentionally NOT a pyproject dependency (its setup.py needs
    # PHARLAP_HOME at build time, which breaks lockfile resolution on hosts
    # without PHaRLAP). This step rebuilds it into the freshly-created venv when
    # PHaRLAP is present, so a clone whose venv was rebuilt self-heals
    # raytracing instead of silently dropping to the geometric fallback. It
    # exits 0 when PHaRLAP/gfortran are absent — raytracing is optional.
    "/opt/git/sigmond/hf-timestd/scripts/ensure-pylap.sh",
]
produces = [
    "/opt/git/sigmond/hf-timestd/venv/bin/hf-timestd",
    "/opt/git/sigmond/hf-timestd/venv/bin/timestd",
]

# ---------------------------------------------------------------------------
# Install phase: place files at FHS-compliant locations on the target.
#
# kind = "link"   — symlink dst → src (relative to repo root)
# kind = "copy"   — cp with chmod
# kind = "render" — copy a template, never overwriting an existing user file
#                   (controlled by if_absent = true)
# ---------------------------------------------------------------------------

[install]

# CLI shims (the venv binaries already exist; sigmond does not need to
# re-symlink them, but documenting them here keeps the contract honest).
[[install.steps]]
kind = "link"
src  = "/opt/git/sigmond/hf-timestd/venv/bin/hf-timestd"
dst  = "/usr/local/bin/hf-timestd"

[[install.steps]]
kind = "link"
src  = "/opt/git/sigmond/hf-timestd/venv/bin/timestd"
dst  = "/usr/local/bin/timestd"

# Systemd units — symlinked from the repo so `git pull` updates them.
[[install.steps]]
kind = "link"
src  = "systemd/timestd-core-recorder.service"
dst  = "/etc/systemd/system/timestd-core-recorder.service"

[[install.steps]]
kind = "link"
src  = "systemd/timestd-metrology@.service"
dst  = "/etc/systemd/system/timestd-metrology@.service"

[[install.steps]]
kind = "link"
src  = "systemd/timestd-metrology.target"
dst  = "/etc/systemd/system/timestd-metrology.target"

[[install.steps]]
kind = "link"
src  = "systemd/timestd-fusion.service"
dst  = "/etc/systemd/system/timestd-fusion.service"

[[install.steps]]
kind = "link"
src  = "systemd/timestd-l2-calibration.service"
dst  = "/etc/systemd/system/timestd-l2-calibration.service"

[[install.steps]]
kind = "link"
src  = "systemd/timestd-physics.service"
dst  = "/etc/systemd/system/timestd-physics.service"

[[install.steps]]
kind = "link"
src  = "systemd/timestd-radiod-monitor.service"
dst  = "/etc/systemd/system/timestd-radiod-monitor.service"

[[install.steps]]
kind = "link"
src  = "systemd/timestd-web-api.service"
dst  = "/etc/systemd/system/timestd-web-api.service"

[[install.steps]]
kind = "link"
src  = "systemd/timestd-vtec.service"
dst  = "/etc/systemd/system/timestd-vtec.service"

# Config template — never overwritten if already present.
[[install.steps]]
kind      = "render"
src       = "config/timestd-config.toml.template"
dst       = "/etc/hf-timestd/timestd-config.toml"
mode      = "0640"
owner     = "timestd:timestd"
if_absent = true

[[install.steps]]
kind      = "render"
src       = "config/environment.timestd.template"
dst       = "/etc/hf-timestd/environment"
mode      = "0640"
owner     = "timestd:timestd"
if_absent = true

# Data, log, and runtime dirs.
[[install.steps]]
kind  = "mkdir"
dst   = "/var/lib/timestd"
mode  = "0755"
owner = "timestd:timestd"

[[install.steps]]
kind  = "mkdir"
dst   = "/var/log/hf-timestd"
mode  = "0755"
owner = "timestd:timestd"

# ---------------------------------------------------------------------------
# Systemd units sigmond should know about for start/stop/status.
# Order matters: dependencies before consumers.
# ---------------------------------------------------------------------------

[systemd]
units = [
    "timestd-core-recorder.service",
    "timestd-metrology.target",
    "timestd-fusion.service",
    "timestd-l2-calibration.service",
    "timestd-physics.service",
    "timestd-radiod-monitor.service",
    "timestd-web-api.service",
    "timestd-vtec.service",
    # Timers — listed here so `smd start/stop` toggles them too.
    "timestd-chrony-monitor.timer",
    "timestd-ionex-download.timer",
    "timestd-iono-reanalysis.timer",
    "timestd-pipeline-watchdog.timer",
    # timestd-hfps-watchdog.timer — DEPRECATED 2026-06-28: the HFPS (Method-5
    # diff-detector) SHM feed is disabled (off-air / not in the chrony config),
    # so the watchdog only flapped trying to restart the recorder for an absent
    # feed.  Unit files + script retained (disable-not-delete); re-add this line
    # and re-enable the timer if HFPS is brought back.
    "timestd-hpps-watchdog.timer",
    "timestd-prune.timer",
    "grape-daily.timer",
    # grape-upload-retry.timer — RETIRED 2026-06-30 (single-host uploader):
    # hs-uploader.service owns GRAPE upload retries now; the in-process
    # retry timer is superseded.  Unit files retained (disable-not-delete);
    # re-add this line only if a host reverts to in-process GRAPE upload.
]
templated_units = [
    "timestd-metrology@.service",
]

# ---------------------------------------------------------------------------
# Dependencies sigmond should ensure are present before installing
# this client.  Mirrors the existing wsprdaemon-client deps.conf format.
# ---------------------------------------------------------------------------

[deps]

[[deps.git]]
name       = "ka9q-python"
url        = "https://github.com/ka9q/ka9q-python.git"
install_to = "/opt/ka9q-python"
# commit pin: leave blank to track main; sigmond will warn on drift.
commit     = ""

[[deps.system]]
# These are checked via dpkg/rpm, not installed.
packages = [
    "chrony",
    "python3",
    "python3-venv",
    "python3-pip",
]

# hf-timestd is a PSWS-singleton (one station_id per host); the verifier
# audits per-channel cadence in the local product DB rather than a
# remote upload queue, so kind = "local_db" (no --rx-call / --lost flags).
[client_features.verifier]
verb         = "timestd"
description  = "hf-timestd per-channel cadence audit (local product DB)"
kind         = "local_db"
per_instance = false

# hf-timestd is a singleton (one PSWS station_id per host); the TUI
# Receiver Channels screen reads the absolute config_path rather than
# the per-instance /etc/<client>/<instance>.toml convention.
[client_features.receiver_channels]
description     = "WWV/WWVH/CHU/BPM time-standard channels (per [recorder.channel_group.*])"
per_instance    = false
singleton_label = "(singleton)"
config_path     = "/etc/hf-timestd/timestd-config.toml"
parser_file     = "src/hf_timestd/sigmond_tui.py"
parser_attr     = "parse_receiver_channels"

# ---------------------------------------------------------------------------
# Single-host uploader pipeline (Stage 6).  `smd admin uploader manifest`
# reads this [[hs_uploader.pipeline]] block from every enabled client,
# substitutes per-site identity ({station_id}/{instrument_id} resolved from
# this client's own [station] config), and renders /etc/hs-uploader/
# pipelines.toml for the single-host daemon.  The block shape IS the
# [[pipeline]] shape hs_uploader.pipeline_factory consumes.
#
# The transport `name` and source `source_id` are PINNED verbatim: they are
# the watermark keys the running daemon uses for the grape cursor.  Changing
# them would re-scan the KEEP-retention spool and re-ship already-shipped
# OBS* datasets.
# ---------------------------------------------------------------------------

# GRAPE Digital RF datasets -> PSWS (daily)
[[hs_uploader.pipeline]]
name = "grape-psws"
max_records_per_pump = 64
[hs_uploader.pipeline.source]
type = "filetree"
root = "/var/lib/timestd/upload"
patterns = ["OBS*"]
retention = "keep"
match_dirs = true
table = "grape.dataset"
source_id = "grape-datasets:/var/lib/timestd/upload"
[hs_uploader.pipeline.transport]
type = "psws_dataset"
instrument_id = "{instrument_id}"
host = "pswsnetwork.eng.ua.edu"
table = "grape.dataset"
sftp_user = "{station_id}"
name = "psws-grape-sftp:pswsnetwork.eng.ua.edu:{station_id}"
[hs_uploader.pipeline.identity]
station_id = "{station_id}"
