# Drop-in configuration for radiod CPU affinity
# Install to: /etc/systemd/system/radiod@.service.d/cpu-affinity.conf
# Or for specific instance: /etc/systemd/system/radiod@INSTANCE.service.d/cpu-affinity.conf
#
# This pins radiod to the top 2 CPU cores to ensure it has dedicated
# resources for real-time USB streaming and FFT processing.
#
# After installing:
#   sudo systemctl daemon-reload
#   sudo systemctl restart radiod@INSTANCE

[Service]
# Pin to top 2 cores (cores N-2 and N-1 where N = nproc)
# This is set dynamically by the install script based on actual core count
# Default assumes 16 cores (cores 14-15)
CPUAffinity=14 15

# Ensure high priority for real-time audio processing
Nice=-15
CPUSchedulingPolicy=fifo
CPUSchedulingPriority=80
