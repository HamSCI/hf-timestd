# Drop-in configuration for radiod CPU affinity
# Install to: /etc/systemd/system/radiod@.service.d/cpu-affinity.conf
# Or for specific instance: /etc/systemd/system/radiod@INSTANCE.service.d/cpu-affinity.conf
#
# This configuration pins radiod to the upper half of CPU cores to:
# 1. Isolate real-time USB/FFT processing from other system tasks
# 2. Allow Linux scheduler to distribute 40+ radiod threads efficiently
# 3. Prevent core saturation (100% on 2 cores) by spreading across 8 cores
# 4. Ensure consistent low-latency performance with better thermal distribution
#
# The upper half is chosen to separate radiod from timestd services (lower half)
# and most system services which prefer lower-numbered cores.
#
# Generated by: scripts/setup-cpu-affinity.sh

[Service]
# Pin to upper half: cores 8-15 (upper half of 16 cores)
# This is set dynamically by the install script based on actual core count
CPUAffinity=8 9 10 11 12 13 14 15

# Ensure high priority for real-time audio processing
Nice=-15
CPUSchedulingPolicy=fifo
CPUSchedulingPriority=80
