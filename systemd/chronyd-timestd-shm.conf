# Chrony service override for timestd SHM integration
# Ensure timestd services start before chronyd
# This allows fusion to create the SHM segments with correct permissions
# before chronyd tries to access them
#
# DUAL FEED ARCHITECTURE:
#   SHM 0 (refid TSL1): L1 metrology fusion (raw TOA, ±0.85ms)
#   SHM 1 (refid TSL2): L2 calibrated fusion (corrected D_clock, ±0.3-1.0ms)
#
# Installation:
#   1. Copy to /etc/systemd/system/chronyd.service.d/timestd-shm.conf
#   2. Add to /etc/chrony/chrony.conf:
#        refclock SHM 0 refid TSL1 poll 4 precision 1e-3 offset 0.0
#        refclock SHM 1 refid TSL2 poll 4 precision 1e-4 offset 0.0
#   3. Reload: sudo systemctl daemon-reload && sudo systemctl restart chronyd

[Unit]
After=timestd-metrology.service timestd-l2-calibration.service timestd-fusion.service
Wants=timestd-metrology.service timestd-l2-calibration.service timestd-fusion.service
