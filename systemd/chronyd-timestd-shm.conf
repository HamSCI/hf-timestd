# Chrony service override for timestd SHM integration.
# Ensure timestd writers start before chrony so they create the refclock
# SHM segments at timestd:0666 first. Without this ordering, chrony wins
# the race, creates the segments as root:0600, and the writers (running
# as User=timestd) cannot write — chrony then sits at reach=0 forever.
#
# REFCLOCK FEED OWNERSHIP (current; SHM 0 / the legacy L1 raw feed was
# retired 2026-05-23):
#   SHM 1 (refid FUSE): L2 calibrated fusion             — timestd-fusion.service
#   SHM 2 (refid HPPS): T6 BPSK PPS direct from RX-888   — timestd-core-recorder.service
# (SHM 3 / refid HFPS, the diff-detector feed, exists in code but is
#  disabled by default — gated on `[*.t6] diff_to_shm_unit` and not in
#  the shipped chrony config.)
#
# Installation:
#   1. Copy to /etc/systemd/system/chrony.service.d/timestd-shm.conf
#      (handled automatically by scripts/deploy.sh).
#   2. Ensure /etc/chrony/chrony.conf has (see config/chrony-timestd-refclocks.conf):
#        refclock SHM 1 refid FUSE poll 4 precision 1e-4 offset 0.0 delay 0.001
#        refclock SHM 2 refid HPPS poll 0 precision 5e-6 offset 0.0 delay 0.0001
#   3. Reload: sudo systemctl daemon-reload
#      (No chrony restart needed if it is already running with healthy SHM;
#       the After= ordering only takes effect on next chrony start.)

[Unit]
After=timestd-metrology.target timestd-l2-calibration.service timestd-fusion.service timestd-core-recorder.service
Wants=timestd-metrology.target timestd-l2-calibration.service timestd-fusion.service timestd-core-recorder.service
