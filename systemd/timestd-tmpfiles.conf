# systemd-tmpfiles configuration for hf-timestd
# This ensures /dev/shm/timestd is created on boot with correct permissions
#
# Install to: /etc/tmpfiles.d/timestd.conf
# Manual creation: systemd-tmpfiles --create /etc/tmpfiles.d/timestd.conf
#
# Format: Type Path Mode User Group Age Argument
d /dev/shm/timestd 0755 timestd timestd - -
