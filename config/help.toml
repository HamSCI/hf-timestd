# hf-timestd operator-help sidecar.
#
# Per-key title / help / example / validator_hint / required, plus
# `hidden = true` to keep tier-1 invariants off the wizard surface.
#
# Three-tier audit applied 2026-05-29.  hf-timestd is a PSWS
# SINGLETON (one station_id per host — see project-hf-timestd-singleton
# memory), so tier 3 (per-instance) collapses into tier 2 (per-host):
# the whole config is host-level.
#
#   * tier 1 — install-canonical paths, radiod / Grape protocol
#              constants, internal algorithm tuning; hidden.
#   * tier 2 — operator-facing knobs (station identity, ka9q mDNS
#              host, uploader account, feature flags); surfaced.
#
# The [recorder.channel_group.timestd] block and its inner
# [[...channels]] array-of-tables (the WWV/CHU/WWVB sample list) are
# wizard-skipped (nested arrays not editable in TUI).  Operators
# drop to $EDITOR for that today.

# --- Station identity ----------------------------------------------

[station.callsign]
title          = "Amateur callsign"
help           = """Your amateur radio callsign (uppercase).
Used as the operator identity for HamSCI / PSWS metadata."""
example        = "AC0G"
validator_hint = "1-9 letters/digits/slashes"
required       = true

[station.id]
title          = "PSWS station ID (Grape)"
help           = """The PSWS-assigned station ID for Grape uploads
(format: S followed by six digits).  Co-resident clients
(mag-recorder, hf-tec) have their OWN PSWS station IDs --
PSWS treats each measurement as its own station."""
example        = "S000171"
validator_hint = "S followed by 6 digits"
required       = true

[station.instrument_id]
title          = "PSWS instrument ID"
help           = """Per-instrument identifier under your PSWS station
(Grape).  Set by PSWS when you registered the instrument."""
example        = "172"
required       = true

[station.grid_square]
title          = "Maidenhead grid square"
help           = """Your Maidenhead locator (6 characters minimum)."""
example        = "EM38ww40pk"
validator_hint = "2 letters + 2 digits + 2-8 alphanumeric chars"
required       = true

[station.latitude]
title          = "Station latitude (decimal degrees)"
example        = "38.918461"
validator_hint = "decimal degrees, -90.0 to 90.0"
required       = true

[station.longitude]
title          = "Station longitude (decimal degrees)"
example        = "-92.127974"
validator_hint = "decimal degrees, -180.0 to 180.0"
required       = true

[station.description]
title          = "Station description (free-form)"
help           = """One-line description shown in PSWS metadata.
Useful for distinguishing multiple stations under the same
operator."""
example        = "beelink rx888 SAS"
required       = false

# --- ka9q-radio binding --------------------------------------------

[ka9q.status]
title          = "ka9q-radio mDNS status host"
help           = """The mDNS hostname of the radiod instance this
recorder consumes RTP from -- always .local, never an IP."""
example        = "bee1-status.local"
validator_hint = "must end with .local"
required       = true

