# --- Metrology feature flags ---------------------------------------

[metrology.physics_products]
title          = "Compute physics products?"
help           = """When ON (default), hf-timestd's metrology
service computes physics products (Doppler, phase, electron content
estimates) from each cycle's measurements.  Turn OFF only for
recorder-only deployments."""
required       = false

[metrology.realtime_iono]
title          = "Run real-time ionospheric inversion?"
help           = """When ON (default), the metrology service emits
real-time ionospheric height estimates.  Turn OFF if you only need
the raw measurements and will run the inversion offline."""
required       = false

# --- GNSS VTEC (external GNSS data source) -------------------------

[gnss_vtec.enabled]
title          = "Pull GNSS VTEC from an external server?"
help           = """When ON, hf-timestd connects to a GNSS-VTEC
server (e.g. SCINDA, a local rtklib instance) for collateral
electron-content data.  Turn OFF if you don't have a GNSS source."""
required       = false

[gnss_vtec.host]
title          = "GNSS-VTEC server host"
help           = """IP or hostname of the GNSS-VTEC server.  Typically
a local rtklib host on your LAN; set to the server's address."""
example        = "192.168.1.80"
required       = false

[gnss_vtec.port]
title          = "GNSS-VTEC server port"
example        = "9000"
required       = false

[gnss_vtec.csv_path]
hidden = true

[gnss_vtec.hdf5_path]
hidden = true

[gnss_vtec.save_csv]
hidden = true

[gnss_vtec.save_hdf5]
hidden = true

# --- Uploader (PSWS-Grape) -----------------------------------------

[uploader.enabled]
title          = "Upload to PSWS-Grape?"
help           = """When ON (default), hf-timestd runs its daily
SFTP upload of compressed Digital RF cycles to PSWS.  Turn OFF
for offline / development runs."""
required       = false

[uploader.upload_time]
title          = "Daily upload time (HH:MM)"
help           = """When the daily SFTP upload runs.  Format HH:MM
in upload_timezone (default UTC).  00:30 is the canonical default
(off-peak in most timezones)."""
example        = "00:30"
validator_hint = "HH:MM, 24-hour"
required       = false

# Tier 1 — UTC is the canonical PSWS timezone; never overridden.
[uploader.upload_timezone]
hidden = true

# Tier 1 — sftp is the only supported protocol.
[uploader.protocol]
hidden = true

# Tier 1 — retry / queue / backoff are internal defaults.
[uploader.exponential_backoff]
hidden = true

[uploader.max_queue_size_gb]
hidden = true

[uploader.max_retries]
hidden = true

[uploader.retry_delay_seconds]
hidden = true

# Tier 1 — PSWS endpoint is fixed.
[uploader.sftp.host]
hidden = true

[uploader.sftp.user]
title          = "PSWS SFTP user (station ID)"
help           = """SFTP login user on pswsnetwork.eng.ua.edu.
Defaults to the PSWS station ID (the common case)."""
example        = "S000171"
required       = true

[uploader.sftp.ssh_key]
title          = "PSWS SSH private key path"
help           = """Path to the SSH private key registered with PSWS.
On hosts running mag-recorder too, this is typically
/home/timestd/.ssh/id_rsa_psws -- the same key authorises uploads
for any instrument under one operator's PSWS account."""
example        = "/home/timestd/.ssh/id_rsa_psws"
required       = true

[uploader.sftp.bandwidth_limit_kbps]
title          = "Upload bandwidth cap (kbit/s)"
help           = """Max outbound bandwidth used by the daily SFTP
upload.  500 kbit/s is the canonical default; raise on fast
uplinks, lower if you share with realtime traffic.

Special value: 0 means UNLIMITED."""
example        = "500"
validator_hint = "integer kbit/s; 0 = unlimited"
required       = false

[uploader.metadata.include_extended_metadata]
hidden = true

