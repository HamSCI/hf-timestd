[services.profile]
title          = "Service profile"
help           = """Which services run on this host:

  full      All hf-timestd services (recorder + metrology + uploader
            + GNSS VTEC + L6 PPS + web UI).  Default for production.
  minimal   Recorder + uploader only.  Use for resource-constrained
            hosts where metrology isn't needed.
"""
example        = "full"
validator_hint = '"full" or "minimal"'
required       = false

