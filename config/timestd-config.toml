# HF-TIMESTD Configuration
# Station: AC0G-BEE1

[station]
callsign = "AC0G"
grid_square = "EM38ww40pk"
id = "S000171"
instrument_id = "172"
description = "beelink rx888 SAS"
latitude = 38.918461
longitude = -92.127974

[ka9q]
status_address = "bee1-status.local"
auto_create_channels = true
# Data source mode: "radiod" (single antenna, 9 channels) or "phase-engine" (beamformed, 17 channels)
source = "radiod"

[recorder]
mode = "production"
test_data_root = "/tmp/timestd-test"
production_data_root = "/var/lib/timestd"
recording_interval = 60
continuous = true
blocktime_ms = 20
max_gap_seconds = 60
storage_quota = "80%"
# Compression: 'none', 'zstd', or 'lz4' - reduces disk I/O by ~2-3x
# zstd: best compression ratio, moderate CPU
# lz4: fastest, lower compression ratio
# Requires: pip install zstandard (for zstd) or pip install lz4 (for lz4)
compression = "zstd"
compression_level = 3  # zstd: 1-22, lz4: 1-12

# Save L0 raw IQ data using Digital RF HDF5 format
# This uses significant storage (~1.5GB/day/channel), managed by storage_quota
# DISABLED: Causing OOM issues with 9 channels (2026-01-02)
save_digital_rf = false

# Tiered Storage: Use /dev/shm (RAM) for hot buffer, disk for cold storage
# Eliminates disk round-trip for real-time pipeline
# Auto-configures based on available RAM (default: 20% of RAM for hot buffer)
tiered_storage = true
hot_buffer_root = "/dev/shm/timestd"
ram_percent = 20  # Percentage of available RAM to use for hot buffer

[recorder.channel_defaults]
preset = "iq"
sample_rate = 24000
agc = 0
gain = 0
encoding = "F32"

[[recorder.channels]]
frequency_hz = 2500000
description = "SHARED_2500"

[[recorder.channels]]
frequency_hz = 5000000
description = "SHARED_5000"

[[recorder.channels]]
frequency_hz = 10000000
description = "SHARED_10000"

[[recorder.channels]]
frequency_hz = 15000000
description = "SHARED_15000"

[[recorder.channels]]
frequency_hz = 20000000
description = "WWV_20000"

[[recorder.channels]]
frequency_hz = 25000000
description = "WWV_25000"

[[recorder.channels]]
frequency_hz = 3330000
description = "CHU_3330"

[[recorder.channels]]
frequency_hz = 7850000
description = "CHU_7850"

[[recorder.channels]]
frequency_hz = 14670000
description = "CHU_14670"

# CHU FSK decode channels: USB preset for FSK tone demodulation
# These are not archived - only used for real-time FSK decode + timing correlation
# with the corresponding IQ archive channels above.
[recorder.chu_fsk]
preset = "usb"
sample_rate = 12000
agc = 0
gain = 0
encoding = "F32"

[[recorder.chu_fsk.channels]]
frequency_hz = 3330000
description = "CHU_3330_FSK"
iq_channel = "CHU_3330"

[[recorder.chu_fsk.channels]]
frequency_hz = 7850000
description = "CHU_7850_FSK"
iq_channel = "CHU_7850"

[[recorder.chu_fsk.channels]]
frequency_hz = 14670000
description = "CHU_14670_FSK"
iq_channel = "CHU_14670"

[uploader]
enabled = true
protocol = "sftp"
upload_time = "00:30"
upload_timezone = "UTC"
max_retries = 5
retry_delay_seconds = 300
exponential_backoff = true
max_queue_size_gb = 100

[uploader.sftp]
host = "pswsnetwork.eng.ua.edu"
user = "S000171"
ssh_key = "/home/timestd/.ssh/id_rsa_psws"
bandwidth_limit_kbps = 500

[uploader.metadata]
include_extended_metadata = false

[logging]
level = "DEBUG"
console_output = true
file_output = true

[monitoring]
enable_metrics = true

[web_ui]
port = 8000
refresh_interval = 60

[timing]
# Timing Authority Mode:
#   "rtp"    - Trust radiod's GPS_TIME/RTP_TIMESNAP (L4/L5: GPS+PPS on radiod)
#   "fusion" - Use HF fusion to establish RTP-to-UTC mapping (L3/L2/L1)
#   "auto"   - Monitor discrepancy, infer best source (future)
authority = "rtp"  # L4: radiod has LAN GPS+PPS feed from 192.168.0.202

# Expected accuracy when authority = "rtp" (used for search window sizing)
# L5 (GPS+PPS local): 0.0001 ms (100 ns)
# L4 (GPS+PPS LAN):   0.001 ms (1 μs)
rtp_expected_accuracy_ms = 0.001  # L4 accuracy

# Validation threshold: warn if fusion disagrees with RTP by more than this
# Catches misconfiguration (e.g., claimed L5 but radiod only has NTP)
validation_threshold_ms = 5.0

# Always run fusion for comparison (recommended for validation)
always_run_fusion = true

# Timing snapshot capture rate (Hz) - matches radiod's status update rate
# Metrological justification: Captures all NTP slew/step events
timing_snapshot_rate_hz = 2.0

[gnss_vtec]
enabled = true
host = "192.168.0.202"
port = 9000
save_csv = true
csv_path = "data/gnss_vtec.csv"
save_hdf5 = true
hdf5_path = "data/gnss_vtec"
