# HF Time Standard Chrony Refclock Configuration
# Add this to /etc/chrony/chrony.conf or include it via:
#   include /etc/hf-timestd/chrony-timestd-refclocks.conf

# FUSE Feed: HF fusion (multi-broadcast Kalman, L2 calibrated)
# - Multi-station fusion across WWV/WWVH/CHU with L2 calibration applied
# - Uncertainty: ±0.3-1.0ms (ISO GUM uncertainty budget)
# - Latency: ~105-195 seconds
# - Primary HF source when on-host GPS+PPS is absent
refclock SHM 1 refid FUSE poll 4 precision 1e-4 offset 0.0 delay 0.001

# HPPS Feed: HF-PPS via BPSK matched-filter on TS-1 (LB-1421 GPSDO disciplined)
# - Bypasses HF fusion uncertainty; sees BPSK quantization-limited floor
# - Measured precision ~14ns std dev once locked
# - poll 0 = 1s = matches PPS cadence
refclock SHM 2 refid HPPS poll 0 precision 5e-6 offset 0.0 delay 0.0001

# Chrony will prefer HPPS (sub-microsecond) over FUSE (sub-millisecond)
# when both are available.  Configure 'prefer' on FUSE if HPPS is absent.

# Monitor with:
#   chronyc sources -v
#   chronyc sourcestats
